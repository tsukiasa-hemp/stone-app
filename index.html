<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天然石診断</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background-color:#0d0d1a;
  background-image:url('https://tsukiasa-hemp.github.io/stone-app/IMG_9569.jpeg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  position:relative;
  display:flex; align-items:center; justify-content:center;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
  padding:20px;
}
body::before { content:""; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,8,20,0.78); z-index:0; }
@keyframes goldShimmer {
  0%   { border-color:#c9a84c; box-shadow:0 8px 60px rgba(0,0,0,0.6),0 0 8px rgba(201,168,76,0.3); }
  25%  { border-color:#f0d060; box-shadow:0 8px 60px rgba(0,0,0,0.6),0 0 24px rgba(240,208,96,0.7),0 0 48px rgba(240,208,96,0.3); }
  50%  { border-color:#e8c96a; box-shadow:0 8px 60px rgba(0,0,0,0.6),0 0 12px rgba(232,201,106,0.5); }
  75%  { border-color:#fff0a0; box-shadow:0 8px 60px rgba(0,0,0,0.6),0 0 32px rgba(255,240,160,0.8),0 0 60px rgba(255,240,160,0.3); }
  100% { border-color:#c9a84c; box-shadow:0 8px 60px rgba(0,0,0,0.6),0 0 8px rgba(201,168,76,0.3); }
}
.container {
  position:relative;
  z-index:1;
  max-width:440px; width:100%;
  background:#d0d0d0;
  border-radius:24px; border:2px solid #c9a84c;
  padding:36px 28px;
  animation:goldShimmer 3.5s ease-in-out infinite;
}
.header { text-align:center; margin-bottom:32px; }
.title { font-size:26px; color:#2d2d2d; margin:0 0 6px; font-weight:normal; letter-spacing:4px; }
.subtitle { font-size:13px; color:#6b6b6b; letter-spacing:1.5px; }
.menu-lead { color:#4a4a4a; text-align:center; font-size:14px; margin-bottom:16px; letter-spacing:1px; }
.menu-btn {
  width:100%; display:flex; align-items:center; gap:16px;
  padding:18px 20px; border-radius:14px;
  border:1.5px solid #c9a84c;
  color:#fff; cursor:pointer; margin-bottom:12px; text-align:left;
}
.menu-btn-zodiac { background:linear-gradient(135deg,#2C3E50,#4A235A); }
.menu-btn-mood   { background:linear-gradient(135deg,#1a5276,#117A65); }
.menu-icon { font-size:28px; min-width:36px; text-align:center; }
.menu-btn-title { font-size:15px; font-weight:bold; margin-bottom:4px; }
.menu-btn-sub   { font-size:12px; opacity:0.75; }
.section-lead { color:#2d2d2d; text-align:center; font-size:16px; margin-bottom:20px; letter-spacing:1px; }
.zodiac-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.zodiac-btn {
  background:rgba(255,255,255,0.6); border:1.5px solid #c9a84c;
  border-radius:10px; color:#2d2d2d; padding:12px 4px;
  font-size:13px; cursor:pointer; letter-spacing:0.5px;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.zodiac-btn:hover { background:rgba(201,168,76,0.15); }
.step-indicator { display:flex; align-items:center; justify-content:center; margin-bottom:24px; gap:4px; }
.step-dot { width:10px; height:10px; border-radius:50%; background:rgba(0,0,0,0.15); display:inline-block; transition:background 0.3s; }
.step-dot.active { background:#c9a84c; }
.step-line { width:40px; height:1px; background:rgba(0,0,0,0.15); display:inline-block; }
.mood-options { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.mood-btn {
  background:rgba(255,255,255,0.6); border:1.5px solid #c9a84c;
  border-radius:12px; color:#2d2d2d; padding:14px 18px;
  font-size:14px; cursor:pointer; text-align:left; letter-spacing:0.5px;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.mood-btn:hover { background:rgba(201,168,76,0.15); }
.result-section { text-align:center; }
.result-label { color:#6b6b6b; font-size:13px; letter-spacing:2px; margin-bottom:20px; }
.stones-wrapper { display:flex; flex-direction:column; gap:20px; margin-bottom:20px; }
.stone-card {
  background:rgba(255,255,255,0.5); border:1.5px solid #c9a84c;
  border-radius:16px; padding:24px 20px; text-align:center;
}
.stone-name { font-size:22px; color:#2d2d2d; margin:0 0 8px; font-weight:normal; letter-spacing:3px; }
.keyword { color:#a07c28; font-size:12px; letter-spacing:2px; margin-bottom:12px; }
.desc { color:#4a4a4a; font-size:13px; line-height:1.8; margin-bottom:16px; letter-spacing:0.5px; }
.shop-btn {
  display:block; background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff; text-decoration:none; border-radius:10px;
  padding:12px 16px; font-size:13px; letter-spacing:1px;
  box-shadow:0 4px 16px rgba(124,58,237,0.5);
}
.shop-btn-disabled {
  display:block; background:rgba(0,0,0,0.06); color:#999;
  border-radius:10px; padding:12px 16px; font-size:13px;
  border:1.5px solid #d4b86a; letter-spacing:1px;
}
.retry-row { display:flex; gap:10px; margin-bottom:12px; }
.retry-btn {
  flex:1; background:rgba(255,255,255,0.5); border:1.5px solid #c9a84c;
  border-radius:10px; color:#4a4a4a; padding:10px 6px; font-size:11px; cursor:pointer;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.back-btn {
  background:none; border:none; color:#a07c28;
  font-size:13px; cursor:pointer; letter-spacing:1px;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.hidden { display:none; }
@keyframes sparkle1 { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:1;transform:scale(1)} }
@keyframes sparkle2 { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:0.85;transform:scale(1)} }
@keyframes sparkle3 { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:0.7;transform:scale(1)} }
@keyframes glimmer  { 0%,100%{opacity:0.08} 50%{opacity:0.22} }
.sp1{animation:sparkle1 2.2s ease-in-out infinite}
.sp2{animation:sparkle2 2.8s ease-in-out infinite 0.6s}
.sp3{animation:sparkle3 2.4s ease-in-out infinite 1.1s}
.sp4{animation:sparkle1 3.1s ease-in-out infinite 0.3s}
.sp5{animation:sparkle2 2.5s ease-in-out infinite 1.6s}
.sp6{animation:sparkle3 2.9s ease-in-out infinite 0.9s}
.gl1{animation:glimmer 3s ease-in-out infinite}
.gl2{animation:glimmer 3.4s ease-in-out infinite 1s}
.gl3{animation:glimmer 2.8s ease-in-out infinite 0.5s}
</style>
</head>

function showScreen(id) {
  var screens = ["screen-top","screen-zodiac","screen-mood","screen-result"];
  for (var i = 0; i < screens.length; i++) {
    document.getElementById(screens[i]).className = "hidden";
  }
  document.getElementById(id).className = "";
}

function showResult(stones) {
  var wrapper = document.getElementById("stones-wrapper");
  wrapper.innerHTML = "";
  for (var i = 0; i < stones.length; i++) {
    var stone = stones[i];
    var url = STONE_URLS[stone.name];
    var svg = STONE_SVGS[stone.name] || "";
    var btnHtml = url
      ? '<a href="' + url + '" target="_blank" class="shop-btn">🛍 このアクセサリーを見る</a>'
      : '<div class="shop-btn-disabled">🔮 近日入荷予定</div>';
    var card = document.createElement("div");
    card.className = "stone-card";
    card.innerHTML = '<div style="width:80px;height:80px;margin:0 auto 16px;filter:drop-shadow(0 0 10px rgba(201,168,76,0.4));">' + svg + '</div>'
      + '<h2 class="stone-name">' + stone.name + '</h2>'
      + '<div class="keyword">✦ ' + stone.keyword + ' ✦</div>'
      + '<p class="desc">' + stone.description + '</p>'
      + btnHtml;
    wrapper.appendChild(card);
  }
  showScreen("screen-result");
}

  var q = MOOD_QUESTIONS[moodStep];
  document.getElementById("mood-question").textContent = q.question;
  document.getElementById("dot0").className = "step-dot active";
  document.getElementById("dot1").className = moodStep >= 1 ? "step-dot active" : "step-dot";
  var opts = document.getElementById("mood-options");
  opts.innerHTML = "";
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    var btn = document.createElement("button");
    btn.className = "mood-btn";
    btn.textContent = opt.label;
    (function(v){ btn.onclick = function(){ handleMoodAnswer(v); }; })(opt.value);
    opts.appendChild(btn);
  }
}

function handleMoodAnswer(value) {
  moodAnswers["q" + (moodStep + 1)] = value;
  if (moodStep < MOOD_QUESTIONS.length - 1) {
    moodStep++;
    renderMoodQuestion();
  } else {
    var key = moodAnswers.q1 + "-" + moodAnswers.q2;
    showResult(MOOD_RESULTS[key] || MOOD_RESULTS["tired-peace"]);
  }
}

// 初期化
document.getElementById("btn-zodiac").onclick = function(){ showScreen("screen-zodiac"); };
document.getElementById("btn-mood").onclick = function(){ startMood(); };
document.getElementById("back-from-zodiac").onclick = function(){ showScreen("screen-top"); };
document.getElementById("back-from-mood").onclick = function(){ showScreen("screen-top"); };
document.getElementById("retry-zodiac").onclick = function(){ showScreen("screen-zodiac"); };
document.getElementById("retry-mood").onclick = function(){ startMood(); };
document.getElementById("back-to-top").onclick = function(){ showScreen("screen-top"); };

// 星座グリッド生成
var grid = document.getElementById("zodiac-grid");
for (var i = 0; i < ZODIACS.length; i++) {
  var btn = document.createElement("button");
  btn.className = "zodiac-btn";
  btn.textContent = ZODIACS[i];
  (function(z){ btn.onclick = function(){ showResult(ZODIAC_STONES[z]); }; })(ZODIACS[i]);
  grid.appendChild(btn);
}
</script>
