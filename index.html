<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天然石診断</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:linear-gradient(160deg,#0d0d1a 0%,#1a0a2e 50%,#0d1a1a 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
  padding:20px;
}
.container {
  max-width:440px; width:100%;
  background:rgba(255,255,255,0.04);
  border-radius:24px; border:1px solid rgba(255,255,255,0.1);
  padding:36px 28px;
  box-shadow:0 8px 60px rgba(0,0,0,0.6);
}
.header { text-align:center; margin-bottom:32px; }
.title { font-size:26px; color:#f0e6ff; margin:0 0 6px; font-weight:normal; letter-spacing:4px; }
.subtitle { font-size:13px; color:#a89bc0; letter-spacing:1.5px; }
.menu-lead { color:#c9b8e8; text-align:center; font-size:14px; margin-bottom:16px; letter-spacing:1px; }
.menu-btn {
  width:100%; display:flex; align-items:center; gap:16px;
  padding:18px 20px; border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  color:#fff; cursor:pointer; margin-bottom:12px; text-align:left;
}
.menu-btn-zodiac { background:linear-gradient(135deg,#2C3E50,#4A235A); }
.menu-btn-mood   { background:linear-gradient(135deg,#1a5276,#117A65); }
.menu-icon { font-size:28px; min-width:36px; text-align:center; }
.menu-btn-title { font-size:15px; font-weight:bold; margin-bottom:4px; }
.menu-btn-sub   { font-size:12px; opacity:0.75; }
.section-lead { color:#e0d0ff; text-align:center; font-size:16px; margin-bottom:20px; letter-spacing:1px; }
.zodiac-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.zodiac-btn {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; color:#e0d0ff; padding:12px 4px;
  font-size:13px; cursor:pointer; letter-spacing:0.5px;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.zodiac-btn:hover { background:rgba(255,255,255,0.14); }
.step-indicator { display:flex; align-items:center; justify-content:center; margin-bottom:24px; gap:4px; }
.step-dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.2); display:inline-block; transition:background 0.3s; }
.step-dot.active { background:#c084fc; }
.step-line { width:40px; height:1px; background:rgba(255,255,255,0.2); display:inline-block; }
.mood-options { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.mood-btn {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:12px; color:#e0d0ff; padding:14px 18px;
  font-size:14px; cursor:pointer; text-align:left; letter-spacing:0.5px;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.mood-btn:hover { background:rgba(255,255,255,0.14); }
.result-section { text-align:center; }
.result-label { color:#a89bc0; font-size:13px; letter-spacing:2px; margin-bottom:20px; }
.stones-wrapper { display:flex; flex-direction:column; gap:20px; margin-bottom:20px; }
.stone-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  border-radius:16px; padding:24px 20px; text-align:center;
}
.stone-circle {
  width:80px; height:80px; border-radius:50%;
  margin:0 auto 16px;
  box-shadow:0 0 30px rgba(200,150,255,0.4);
  border:2px solid rgba(255,255,255,0.2);
}
.stone-name { font-size:22px; color:#f0e6ff; margin:0 0 8px; font-weight:normal; letter-spacing:3px; }
.keyword { color:#c084fc; font-size:12px; letter-spacing:2px; margin-bottom:12px; }
.desc { color:#c9b8e8; font-size:13px; line-height:1.8; margin-bottom:16px; letter-spacing:0.5px; }
.shop-btn {
  display:block; background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff; text-decoration:none; border-radius:10px;
  padding:12px 16px; font-size:13px; letter-spacing:1px;
  box-shadow:0 4px 16px rgba(124,58,237,0.5);
}
.shop-btn-disabled {
  display:block; background:rgba(255,255,255,0.08); color:#8a7a9a;
  border-radius:10px; padding:12px 16px; font-size:13px;
  border:1px solid rgba(255,255,255,0.1); letter-spacing:1px;
}
.retry-row { display:flex; gap:10px; margin-bottom:12px; }
.retry-btn {
  flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; color:#c9b8e8; padding:10px 6px; font-size:11px; cursor:pointer;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.back-btn {
  background:none; border:none; color:#7c6a9a;
  font-size:13px; cursor:pointer; letter-spacing:1px;
  font-family:'Georgia','Hiragino Mincho ProN',serif;
}
.hidden { display:none; }

@keyframes sparkle1 { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:1;transform:scale(1)} }
@keyframes sparkle2 { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:0.85;transform:scale(1)} }
@keyframes sparkle3 { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:0.7;transform:scale(1)} }
@keyframes glimmer  { 0%,100%{opacity:0.08} 50%{opacity:0.22} }
.sp1{animation:sparkle1 2.2s ease-in-out infinite}
.sp2{animation:sparkle2 2.8s ease-in-out infinite 0.6s}
.sp3{animation:sparkle3 2.4s ease-in-out infinite 1.1s}
.sp4{animation:sparkle1 3.1s ease-in-out infinite 0.3s}
.sp5{animation:sparkle2 2.5s ease-in-out infinite 1.6s}
.sp6{animation:sparkle3 2.9s ease-in-out infinite 0.9s}
.gl1{animation:glimmer 3s ease-in-out infinite}
.gl2{animation:glimmer 3.4s ease-in-out infinite 1s}
.gl3{animation:glimmer 2.8s ease-in-out infinite 0.5s}
</style>
</head>

const ZODIAC_STONES = {
  "牡羊座": [{name:"ガーネット",keyword:"情熱・意志・成功",color:"#922B21",description:"強い意志と情熱を燃やす石。目標に向かって力強く進む牡羊座のエネルギーを高めます。"},{name:"ルビー",keyword:"勇気・生命力・愛",color:"#C0392B",description:"炎のような赤が宿る石。行動力と勇気を授け、あなたの情熱をさらに輝かせます。"}],
  "牡牛座": [{name:"ブルートパーズ",keyword:"豊かさ・安定・誠実",color:"#5DADE2",description:"澄んだ青が美しい石。心の安定と豊かさをもたらし、牡牛座の堅実さを後押しします。"},{name:"サファイア",keyword:"知恵・誠実・繁栄",color:"#1A5276",description:"王族に愛されてきた深い青の石。深い知恵と誠実さを引き出してくれます。"}],
  "双子座": [{name:"アクアマリン",keyword:"コミュニケーション・知性・自由",color:"#5DADE2",description:"海の青を宿す石。言葉と思考を研ぎ澄まし、双子座の知的好奇心を広げます。"},{name:"シトリン",keyword:"明晰・喜び・創造力",color:"#F39C12",description:"太陽の光を閉じ込めたような黄金色の石。明るい知性とポジティブなエネルギーをもたらします。"}],
  "蟹座":   [{name:"パール",keyword:"純粋・母性・守護",color:"#F0EAD6",description:"月と海の力を宿す石。深い愛情と守護のエネルギーで蟹座の豊かな感受性を包みます。"},{name:"ムーンストーン",keyword:"直感・感受性・癒し",color:"#D5D8E1",description:"月のエネルギーを宿す石。豊かな直感力と感受性を高め、心に安らぎをもたらします。"}],
  "獅子座": [{name:"ルビー",keyword:"輝き・自信・情熱",color:"#C0392B",description:"王者の石と呼ばれるルビー。獅子座の華やかさと自信を最大限に引き出します。"},{name:"サンストーン",keyword:"活力・創造力・喜び",color:"#E67E22",description:"太陽のように輝く石。あなたの魅力と創造力をさらに高め、周りを明るく照らします。"}],
  "乙女座": [{name:"カーネリアン",keyword:"集中・誠実・実行力",color:"#E74C3C",description:"地に足のついた力を授ける石。乙女座の丁寧さと実行力をさらに高めてくれます。"},{name:"ラピスラズリ",keyword:"知恵・真実・内省",color:"#2E4057",description:"古来より賢者の石とされてきた深い青。真実を見極める力と深い洞察力をもたらします。"}],
  "天秤座": [{name:"オパール",keyword:"調和・美・感受性",color:"#A9CCE3",description:"七色に輝く石。天秤座の美的センスと調和を愛する心をさらに豊かにします。"},{name:"トルマリン",keyword:"バランス・保護・浄化",color:"#1E8449",description:"多彩な色を持つ石。心身のバランスを整え、ネガティブなエネルギーを払います。"}],
  "蠍座":   [{name:"マラカイト",keyword:"変容・保護・深み",color:"#1E8449",description:"緑の渦模様が美しい石。深層心理への洞察力を高め、蠍座の変容の力をサポートします。"},{name:"ガーネット",keyword:"再生・情熱・意志",color:"#922B21",description:"深い赤が力強い石。蠍座の強い意志と再生のエネルギーを後押しします。"}],
  "射手座": [{name:"アメジスト",keyword:"直感・霊性・自由",color:"#7D3C98",description:"高い霊性と直感を開く石。射手座の自由への渇望と探求心をサポートします。"},{name:"ラブラドライト",keyword:"冒険・変容・魔法",color:"#5D6D7E",description:"神秘的な輝きを持つ石。新たな地平への扉を開き、冒険への勇気を与えます。"}],

const ZODIACS = ["牡羊座","牡牛座","双子座","蟹座","獅子座","乙女座","天秤座","蠍座","射手座","山羊座","水瓶座","魚座"];

let moodAnswers = {};
let moodStep = 0;

function showScreen(id) {
  ["screen-top","screen-zodiac","screen-mood","screen-result"].forEach(s => {
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function showResult(stones) {
  const wrapper = document.getElementById("stones-wrapper");
  wrapper.innerHTML = "";
  stones.forEach(stone => {
    const url = STONE_URLS[stone.name];
    const btnHtml = url
      ? `<a href="${url}" target="_blank" class="shop-btn">🛍 このアクセサリーを見る</a>`
      : `<div class="shop-btn-disabled">🔮 近日入荷予定</div>`;
    wrapper.innerHTML += `
      <div class="stone-card">
        <div class="stone-circle" style="background:radial-gradient(circle at 35% 35%, white, ${stone.color})"></div>
        <h2 class="stone-name">${stone.name}</h2>
        <div class="keyword">✦ ${stone.keyword} ✦</div>
        <p class="desc">${stone.description}</p>
        ${btnHtml}
      </div>`;
  });
  showScreen("screen-result");
}

// 星座グリッドを生成
const grid = document.getElementById("zodiac-grid");
ZODIACS.forEach(z => {
  const btn = document.createElement("button");
  btn.className = "zodiac-btn";
  btn.textContent = z;
  btn.onclick = () => showResult(ZODIAC_STONES[z]);
  grid.appendChild(btn);
});

// 気分診断
function startMood() {
  moodAnswers = {}; moodStep = 0;
  renderMoodQuestion();
  showScreen("screen-mood");
}

function renderMoodQuestion() {
  const q = MOOD_QUESTIONS[moodStep];
  document.getElementById("mood-question").textContent = q.question;
  document.getElementById("dot0").className = "step-dot" + (moodStep >= 0 ? " active" : "");
  document.getElementById("dot1").className = "step-dot" + (moodStep >= 1 ? " active" : "");
  const opts = document.getElementById("mood-options");
  opts.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "mood-btn";
    btn.textContent = opt.label;
    btn.onclick = () => handleMoodAnswer(opt.value);
    opts.appendChild(btn);
  });
}

function handleMoodAnswer(value) {
  const key = MOOD_QUESTIONS[moodStep].id || ("q" + (moodStep+1));
  moodAnswers["q"+(moodStep+1)] = value;
  if (moodStep < MOOD_QUESTIONS.length - 1) {
    moodStep++;
    renderMoodQuestion();
  } else {
    const resultKey = moodAnswers.q1 + "-" + moodAnswers.q2;
    showResult(MOOD_RESULTS[resultKey] || MOOD_RESULTS["tired-peace"]);
  }
}
